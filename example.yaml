# Advanced / manual example: wiring up the soil_moisture platform directly.
#
# For most users the package is simpler — see README (Quick start):
#   packages:
#     soil: github://ololoepepe/esphome-better-soil-moisture-sensor/soil.package.yaml@v1.1.2
#
# Use this direct form when you need full control: sharing an existing I2C bus,
# exposing only some segments, or custom entity names.

esphome:
  name: soil-sensor

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:
  # Silence routine per-update sensor state spam, keep warnings/errors:
  # logs:
  #   sensor: WARN
api:
ota:
  platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

external_components:
- source: github://ololoepepe/esphome-better-soil-moisture-sensor@v1.1.2
  components: [soil_moisture]

i2c:
  sda: GPIO21
  scl: GPIO22
  frequency: 100kHz
  scan: true

sensor:
- platform: soil_moisture
  address: 0x44
  update_interval: 30s

  # A failed read (sensor MCU busy sampling) is retried, non-blocking, until it
  # lands in the MCU's idle window — so every cycle yields fresh data. Defaults
  # shown; count x interval must exceed one MCU measurement cycle (~130 ms).
  retry_count: 10
  retry_interval: 30ms

  # Segment 0..3. Any field is optional — declare only what you need.
  humidity_0:    {name: "Soil H0"}
  humidity_1:    {name: "Soil H1"}
  humidity_2:    {name: "Soil H2"}
  humidity_3:    {name: "Soil H3"}

  temperature_0: {name: "Soil T0"}
  temperature_1: {name: "Soil T1"}
  temperature_2: {name: "Soil T2"}
  temperature_3: {name: "Soil T3"}

  # Raw oscillator counts — handy for calibration/diagnostics.
  frequency_0: {name: "Soil F0", filters: [median: {window_size: 5, send_every: 5}]}
  frequency_1: {name: "Soil F1", filters: [median: {window_size: 5, send_every: 5}]}
  frequency_2: {name: "Soil F2", filters: [median: {window_size: 5, send_every: 5}]}
  frequency_3: {name: "Soil F3", filters: [median: {window_size: 5, send_every: 5}]}

  # Raw thermistor ADC (0..4095) — optional diagnostics.
  # adc_0: {name: "Soil ADC0"}
